name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'build-logic/**'
      - 'lib/**'
      - 'third_party/**'
      - 'gradle.properties'
      - '.github/workflows/publish.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Publish scope'
        required: true
        default: all
        type: choice
        options:
          - third-party
          - all

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Fetch source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install extra-cmake-modules gettext

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android environment
        uses: android-actions/setup-android@v3
        with:
          packages: cmake;3.31.6

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Publish build convention and libs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.target }}" = "third-party" ]; then
            ./gradlew :third_party:onnxruntime-genai-android:publish
          else
            ./gradlew :build-logic:convention:publish :lib:common:publish :lib:plugin-base:publish :third_party:onnxruntime-genai-android:publish
          fi
